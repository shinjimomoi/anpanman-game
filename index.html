<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B00">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<title>アンパンマン あそび</title>
<style>
  :root {
    --orange:   #FF6B00;
    --orange-d: #C24E00;
    --ink:      #2B2B2B;
    --panel:    rgba(255,255,255,0.24);
    --panel-bd: rgba(255,255,255,0.45);
    --font: "Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN",
            "Rounded Mplus 1c", "Segoe UI", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
    position: relative;
    background: #42AAEE;
  }

  /* Shared background scene sits behind every screen */
  #bg { position: fixed; inset: 0; z-index: 0; }

  /* ── Screen router ── */
  .screen {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    opacity: 0; visibility: hidden;
    transform: scale(0.98);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .screen.active { opacity: 1; visibility: visible; transform: scale(1); }

  /* ── Home / back button ── */
  .home-btn {
    position: absolute; top: calc(env(safe-area-inset-top) + 10px); left: 12px;
    z-index: 20;
    width: 52px; height: 52px; border: none; border-radius: 50%;
    background: #fff; color: var(--orange);
    box-shadow: 0 3px 0 rgba(0,0,0,0.18);
    font-size: 26px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .home-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }

  /* ── Sound toggle ── */
  .sound-btn {
    position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 12px;
    z-index: 20;
    width: 52px; height: 52px; border: none; border-radius: 50%;
    background: #fff; box-shadow: 0 3px 0 rgba(0,0,0,0.18);
    font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .sound-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }

  /* ══════════ MENU ══════════ */
  #screen-menu { justify-content: center; align-items: center; gap: 4vh; }
  #menu-title {
    text-align: center; color: #fff;
    font-size: clamp(30px, 9vw, 46px); font-weight: 800; letter-spacing: 2px;
    text-shadow: 3px 3px 0 var(--orange), -1.5px -1.5px 0 var(--orange),
                 1.5px -1.5px 0 var(--orange), -1.5px 1.5px 0 var(--orange);
  }
  #menu-sub { color:#fff; font-size:16px; margin-top:-2vh; text-shadow:1px 1px 3px rgba(0,0,0,.3); }

  .card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    width: min(92vw, 460px);
  }
  .card {
    aspect-ratio: 1 / 0.92;
    border: none; border-radius: 26px;
    background: var(--card-c, #fff);
    box-shadow: 0 6px 0 var(--card-d, #ccc), 0 10px 20px rgba(0,0,0,0.18);
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px;
    transition: transform 0.08s;
  }
  .card:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--card-d,#ccc), 0 4px 10px rgba(0,0,0,0.18); }
  .card svg { width: 64px; height: 64px; }
  .card-label { font-size: 22px; font-weight: 800; color: #fff; text-shadow: 1px 1px 0 rgba(0,0,0,0.15); }

  /* ══════════ Game frames ══════════ */
  .game-title {
    text-align: center; padding: 14px 64px 0; flex-shrink: 0;
    color: #fff; font-size: 24px; font-weight: 800; letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--orange-d), -1px -1px 0 var(--orange-d);
  }
  .level-badge {
    align-self: center; flex-shrink: 0; margin: 2px 0 0;
    background: #fff; color: var(--orange-d);
    font-size: 15px; font-weight: 800; padding: 3px 16px; border-radius: 50px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
  }

  .row-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 6px 10px; }
  .panel {
    width: 100%;
    background: var(--panel); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1.5px solid var(--panel-bd); border-radius: 24px;
    display: flex; align-items: center; justify-content: space-around;
    padding: 16px 8px;
  }
  .hint { text-align: center; font-size: 17px; color: #fff; flex-shrink: 0;
          text-shadow: 1px 1px 3px rgba(0,0,0,0.35); padding: 2px; }

  /* slots / pieces */
  .slot { width: 118px; height: 118px; display:flex; align-items:center; justify-content:center;
          filter: drop-shadow(0 3px 6px rgba(0,0,0,0.16)); }
  .slot.idle { animation: pulse 2.2s ease-in-out infinite; }
  .slot.filled { animation: pop 0.35s ease forwards; }
  .slot svg { width:100%; height:100%; }

  .piece { width: 104px; height: 104px; touch-action: none; cursor: grab;
           filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.28)); transition: opacity 0.2s; }
  .piece svg { width:100%; height:100%; display:block; }
  .piece.placed { opacity: 0 !important; pointer-events: none; }

  .piece-ghost { position: fixed; z-index: 1000; pointer-events: none; touch-action: none;
                 will-change: transform; filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.45)); }
  .piece-ghost svg { width:100%; height:100%; display:block; }

  /* match-mode option buttons */
  .opt { width: 110px; height: 110px; border: none; background: transparent; cursor: pointer;
         filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.28)); transition: transform 0.1s; touch-action: manipulation; }
  .opt:active { transform: scale(0.92); }
  .opt svg { width:100%; height:100%; }
  .opt.wrong { animation: shake 0.32s ease; }
  .target-big { width: 150px; height: 150px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
  .target-big svg { width:100%; height:100%; }

  /* pop-mode bubbles */
  #pop-field { position: absolute; inset: 0; overflow: hidden; z-index: 1; }
  .bubble { position: absolute; bottom: -130px; will-change: transform; cursor: pointer; touch-action: manipulation; }
  .bubble svg { width: 100%; height: 100%; display:block; pointer-events: none; }
  .bubble .ring { position:absolute; inset:-6px; border-radius:50%; background: rgba(255,255,255,0.25); }
  #pop-score { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 14px); left: 0; right: 0;
               text-align:center; color:#fff; font-size:20px; font-weight:800; z-index:5;
               text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }

  /* ── animations ── */
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes pop   { 0%{transform:scale(1)} 45%{transform:scale(1.22)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-12px)} 75%{transform:translateX(12px)} }

  /* ── celebration overlay ── */
  #celebration { display:none; position:fixed; inset:0; z-index:9999;
                 background: rgba(255,240,60,0.9);
                 flex-direction:column; align-items:center; justify-content:center; gap:18px; }
  #celebration.show { display:flex; }
  #celebration .big { font-size: clamp(38px,12vw,56px); font-weight:800; color:var(--orange-d);
                      text-shadow:3px 3px 0 #fff; animation: bb 0.5s infinite alternate; }
  @keyframes bb { from{transform:scale(1) rotate(-3deg)} to{transform:scale(1.12) rotate(3deg)} }
  #celebration svg { width:160px; height:160px; }
  #cele-btns { display:flex; gap:14px; }
  .cele-btn { border:none; border-radius:50px; font-size:22px; font-weight:800; padding:14px 30px;
              cursor:pointer; color:#fff; }
  .cele-next { background:var(--orange); box-shadow:0 4px 0 var(--orange-d); }
  .cele-home { background:#5aa9e6; box-shadow:0 4px 0 #3a7fb5; }
  .cele-btn:active { transform: translateY(3px); }

  .sparkle { position: fixed; font-size: 36px; pointer-events: none; z-index: 9998;
             animation: spk 1.1s ease-out forwards; }
  @keyframes spk { from{opacity:1; transform:scale(0.4) translateY(0)}
                   to  {opacity:0; transform:scale(1.6) translateY(-140px)} }
</style>
</head>

<script>
/* ════════════════════════════════════════════════════════════════
   App state + audio
   ════════════════════════════════════════════════════════════════ */
const App = { sound: true, current: 'menu' };

// ── Levels: persisted per mode, increase difficulty as the child progresses ──
const Levels = {
  data: (() => { try { return JSON.parse(localStorage.getItem('anpanLevels')) || {}; } catch(e) { return {}; } })(),
  get(mode) { return this.data[mode] || 1; },
  set(mode, v) {
    this.data[mode] = v;
    try { localStorage.setItem('anpanLevels', JSON.stringify(this.data)); } catch(e) {}
  },
  next(mode) { this.set(mode, this.get(mode) + 1); },
  // how many items this level should present (gentle ramp, capped)
  count(mode, base, max) { return Math.min(base + Math.floor((this.get(mode) - 1) / 2), max); }
};

// Build a short silent WAV as a data URI (used to flip iOS into "playback"
// audio session so Web Audio is heard even with the ringer/mute switch ON).
function silentWavURI() {
  const sr = 8000, n = Math.floor(sr * 0.4);
  const buf = new ArrayBuffer(44 + n * 2), v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36 + n*2, true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40, n*2, true);
  let bin = ''; const b = new Uint8Array(buf);
  for (let i = 0; i < b.length; i++) bin += String.fromCharCode(b[i]);
  return 'data:audio/wav;base64,' + btoa(bin);
}

const SFX = {
  ctx: null,
  silentEl: null,
  // Create the single shared AudioContext (lazily, inside a user gesture)
  init() {
    if (this.ctx) return this.ctx;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    return this.ctx;
  },
  // iOS unlock: resume the context, play one silent buffer, and loop a silent
  // <audio> element so sound plays even when the phone's mute switch is on.
  unlock() {
    this.init();
    if (this.ctx) {
      if (this.ctx.state === 'suspended') this.ctx.resume();
      try {
        const b = this.ctx.createBuffer(1, 1, 22050);
        const s = this.ctx.createBufferSource();
        s.buffer = b; s.connect(this.ctx.destination); s.start(0);
      } catch(e) {}
    }
    if (!this.silentEl) {
      const a = document.createElement('audio');
      a.setAttribute('playsinline', ''); a.loop = true; a.preload = 'auto';
      a.src = silentWavURI();
      this.silentEl = a;
    }
    this.silentEl.play().catch(() => {});
  },
  tone(freqs, dur, vol, type='sine') {
    if (!App.sound) return;
    const ctx = this.init();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();   // keep alive between rounds
    try {
      freqs.forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = type; o.connect(g); g.connect(ctx.destination);
        const t0 = ctx.currentTime + i * (dur * 0.55);
        o.frequency.setValueAtTime(f, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.start(t0); o.stop(t0 + dur);
      });
    } catch(e) {}
  },
  good()  { this.tone([523, 659, 784], 0.45, 0.3); },
  win()   { this.tone([523,587,659,698,784,880], 0.34, 0.28); },
  wrong() { this.tone([210, 170], 0.22, 0.22, 'triangle'); },
  pop()   { this.tone([700, 1000], 0.16, 0.3, 'sine'); },
};

// Unlock audio on the very first user interaction (required by iOS Safari),
// and keep resuming on later taps in case the OS suspends it.
['touchstart','touchend','mousedown','pointerdown'].forEach(ev =>
  document.addEventListener(ev, () => SFX.unlock(), { passive: true }));

  document.querySelectorAll('.snd, #sound-menu').forEach(b => b.textContent = App.sound ? '🔊' : '🔈');

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickN(arr,n){ return shuffle(arr).slice(0,n); }

function sparkles(x, y) {
  const em = ['⭐','🌟','✨','🎉','💛','🌈','🎊'];
  for (let i=0;i<7;i++){
    const s=document.createElement('div'); s.className='sparkle'; s.textContent=em[i%em.length];
    s.style.left=(x+(Math.random()-0.5)*100)+'px'; s.style.top=(y+(Math.random()-0.5)*80)+'px';
    s.style.animationDelay=(i*0.07)+'s'; document.body.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

/* ════════════════════════════════════════════════════════════════
   Generic drag engine (used by Shapes + Colors)
   translate3d ghost — reliable on iOS
   ════════════════════════════════════════════════════════════════ */
const Drag = {
  ghost:null, el:null, ox:0, oy:0, sx:0, sy:0, dx:0, dy:0, onDrop:null,
  begin(e, el){
    if (el.classList.contains('placed')) return;
    const t = e.touches ? e.touches[0] : e;
    const r = el.getBoundingClientRect();
    this.ox=r.left; this.oy=r.top; this.sx=t.clientX; this.sy=t.clientY; this.dx=0; this.dy=0;
    this.ghost=document.createElement('div'); this.ghost.className='piece-ghost';
    this.ghost.style.width=r.width+'px'; this.ghost.style.height=r.height+'px';
    this.ghost.style.left=r.left+'px'; this.ghost.style.top=r.top+'px';
    this.ghost.style.transform='translate3d(0,0,0)';
    this.ghost.innerHTML=el.innerHTML;
    document.body.appendChild(this.ghost);
    el.style.opacity='0.22'; this.el=el;
  },
  move(e){
    if(!this.ghost) return; e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    this.dx=t.clientX-this.sx; this.dy=t.clientY-this.sy;
    this.ghost.style.transform=`translate3d(${this.dx}px,${this.dy}px,0)`;
  },
  end(){
    if(!this.ghost||!this.el) return;
    const w=parseFloat(this.ghost.style.width), h=parseFloat(this.ghost.style.height);
    const cx=this.ox+w/2+this.dx, cy=this.oy+h/2+this.dy;
    this.ghost.remove(); this.ghost=null;
    const el=this.el; this.el=null;
    if(this.onDrop) this.onDrop(el, cx, cy);
  }
};
document.addEventListener('touchmove', e=>Drag.move(e), {passive:false});
document.addEventListener('touchend',  ()=>Drag.end(), {passive:false});
document.addEventListener('mousemove', e=>Drag.move(e));
document.addEventListener('mouseup',   ()=>Drag.end());

function makeDraggable(el){
  el.addEventListener('touchstart', e=>{ e.preventDefault(); Drag.begin(e, el); }, {passive:false});
  el.addEventListener('mousedown',  e=>Drag.begin(e, el));
}
function centerOf(el){ const r=el.getBoundingClientRect(); return {x:r.left+r.width/2, y:r.top+r.height/2}; }

/* ════════════════════════════════════════════════════════════════
   MODE: Shapes
   ════════════════════════════════════════════════════════════════ */
const ModeShapes = {
  placed: new Set(), need: 3,
  start(){
    this.placed = new Set();
    showBadge('shapes');
    this.need = Levels.count('shapes', 3, 5);        // 3 → 4 → 5 as levels rise
    const keys = shuffle(pickN(SHAPE_KEYS, this.need));
    const slots = document.getElementById('shapes-slots');
    const pieces = document.getElementById('shapes-pieces');
    slots.innerHTML=''; pieces.innerHTML='';

    keys.forEach(k=>{
      const sp = Shapes[k];
      const slot=document.createElement('div');
      slot.className='slot idle'; slot.id='sslot-'+k; slot.dataset.shape=k;
      slot.innerHTML=`<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">${sp.outline(sp.stroke)}</svg>`;
      slots.appendChild(slot);
    });
    shuffle(keys).forEach(k=>{                         // pieces in different order
      const sp = Shapes[k];
      const pc=document.createElement('div');
      pc.className='piece'; pc.id='spiece-'+k; pc.dataset.shape=k;
      pc.innerHTML=`<svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">${sp.piece()}</svg>`;
      pieces.appendChild(pc); makeDraggable(pc);
    });

    Drag.onDrop = (el, cx, cy)=>this.drop(el, cx, cy);
  },
  drop(el, cx, cy){
    const shape=el.dataset.shape;
    const slot=document.getElementById('sslot-'+shape);
    const c=centerOf(slot);
    if(Math.hypot(cx-c.x, cy-c.y) < 92){
      el.classList.add('placed');
      const sp=Shapes[shape];
      slot.classList.remove('idle');
      slot.innerHTML=`<svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">${sp.piece()}</svg>`;
      slot.classList.remove('filled'); slot.offsetWidth; slot.classList.add('filled');
      this.placed.add(shape); sparkles(c.x, c.y); SFX.good();
      if(this.placed.size===this.need){ Levels.next('shapes'); setTimeout(()=>celebrate(()=>this.start()), 550); }
    } else {
      // wrong slot shake
      ['sslot-'].forEach(()=>{});
      document.querySelectorAll('#shapes-slots .slot').forEach(s=>{
        if(s.dataset.shape===shape) return;
        const oc=centerOf(s);
        if(Math.hypot(cx-oc.x, cy-oc.y)<92){ SFX.wrong(); s.style.animation='none'; s.offsetWidth; s.style.animation='shake 0.32s ease'; }
      });
      el.style.opacity='1';
    }
  },
  stop(){ Drag.onDrop=null; }
};

}
function ballSVG(c){
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="44" fill="${c.fill}"/>
    <ellipse cx="38" cy="34" rx="13" ry="9" fill="rgba(255,255,255,.35)"/>
    <ellipse cx="40" cy="50" rx="5" ry="6" fill="#222"/><ellipse cx="60" cy="50" rx="5" ry="6" fill="#222"/>
    <circle cx="42" cy="48" r="1.6" fill="#fff"/><circle cx="62" cy="48" r="1.6" fill="#fff"/>
    <path d="M40 64 Q50 72 60 64" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
  </svg>`;
}

const ModeColors = {
  placed:new Set(), need:3,
  start(){
    this.placed=new Set();
    showBadge('colors');
    this.need = Levels.count('colors', 3, 6);        // 3 → 4 → 5 → 6 colors
    const keys=shuffle(pickN(COLOR_KEYS,this.need));
    const slots=document.getElementById('colors-slots');
    const pieces=document.getElementById('colors-pieces');
    slots.innerHTML=''; pieces.innerHTML='';
    keys.forEach(k=>{
      const slot=document.createElement('div'); slot.className='slot idle'; slot.id='cslot-'+k; slot.dataset.color=k;
      slot.innerHTML=bucketSVG(COLORS[k]); slots.appendChild(slot);
    });
    shuffle(keys).forEach(k=>{
      const pc=document.createElement('div'); pc.className='piece'; pc.id='cpiece-'+k; pc.dataset.color=k;
      pc.innerHTML=ballSVG(COLORS[k]); pieces.appendChild(pc); makeDraggable(pc);
    });
    Drag.onDrop=(el,cx,cy)=>this.drop(el,cx,cy);
  },
  drop(el,cx,cy){
    const color=el.dataset.color;
    const slot=document.getElementById('cslot-'+color);
    const c=centerOf(slot);
    if(Math.hypot(cx-c.x,cy-c.y)<92){
      el.classList.add('placed');
      slot.classList.remove('idle','filled'); slot.offsetWidth; slot.classList.add('filled');
      this.placed.add(color); sparkles(c.x,c.y); SFX.good();
      if(this.placed.size===this.need){ Levels.next('colors'); setTimeout(()=>celebrate(()=>this.start()),550); }
    } else {
      document.querySelectorAll('#colors-slots .slot').forEach(s=>{
        if(s.dataset.color===color) return;
        const oc=centerOf(s);
        if(Math.hypot(cx-oc.x,cy-oc.y)<92){ SFX.wrong(); s.style.animation='none'; s.offsetWidth; s.style.animation='shake 0.32s ease'; }
      });
      el.style.opacity='1';
    }
  },
  stop(){ Drag.onDrop=null; }
};

/* ════════════════════════════════════════════════════════════════
   MODE: Match (tap the same one)
   ════════════════════════════════════════════════════════════════ */
const ModeMatch = {
  start(){
    showBadge('match');
    const n = Levels.count('match', 3, 6);           // 3 → 4 → 5 → 6 choices
    const opts=pickN(FACE_KEYS,n);
    const answer=opts[Math.floor(Math.random()*opts.length)];
    const tgt=document.getElementById('match-target');
    tgt.innerHTML=faceSVG(answer);
    tgt.classList.remove('filled'); tgt.offsetWidth; tgt.classList.add('filled');
    const panel=document.getElementById('match-opts'); panel.innerHTML='';
    shuffle(opts).forEach(k=>{
      const b=document.createElement('button'); b.className='opt'; b.dataset.key=k;
      b.innerHTML=faceSVG(k);
      b.onclick=()=>{
        if(k===answer){ const c=centerOf(b); sparkles(c.x,c.y); SFX.good(); Levels.next('match'); setTimeout(()=>celebrate(()=>this.start()),350); }
        else { SFX.wrong(); b.classList.remove('wrong'); b.offsetWidth; b.classList.add('wrong'); }
      };
      panel.appendChild(b);
    });
  },
  stop(){}
};

/* ════════════════════════════════════════════════════════════════
   MODE: Pop (tap floating bubbles)
   ════════════════════════════════════════════════════════════════ */
const ModePop = {
  timer:null, score:0, running:false, goal:6, done:false,
  start(){
    this.score=0; this.running=true; this.done=false;
    showBadge('pop');
    const lvl = Levels.get('pop');
    this.goal = 5 + (lvl - 1) * 3;                    // more to pop each level
    const interval = Math.max(450, 900 - (lvl - 1) * 70);
    document.getElementById('pop-score').textContent = 'タッチ: 0 / ' + this.goal;
    const field=document.getElementById('pop-field'); field.innerHTML='';
    this.spawn(); this.spawn();
    this.timer=setInterval(()=>this.spawn(), interval);
  },
  spawn(){
    if(!this.running) return;
    const field=document.getElementById('pop-field');
    if(field.childElementCount>9) return;
    const key=FACE_KEYS[Math.floor(Math.random()*FACE_KEYS.length)];
    const size=70+Math.random()*42;
    const b=document.createElement('div'); b.className='bubble';
    b.style.width=size+'px'; b.style.height=size+'px';
    b.style.left=(Math.random()*(innerWidth-size-20)+10)+'px';
    const dur=5.5+Math.random()*3;
    b.innerHTML=`<div class="ring"></div>${faceSVG(key)}`;
    field.appendChild(b);
    // rise animation via WAAPI (reliable, easy to read finish)
    const anim=b.animate(
      [{transform:`translateY(0) rotate(${(Math.random()-0.5)*20}deg)`},
       {transform:`translateY(-${innerHeight+220}px) rotate(${(Math.random()-0.5)*40}deg)`}],
      {duration:dur*1000, easing:'linear'}
    );
    anim.onfinish=()=>b.remove();
    const pop=(e)=>{ e.preventDefault();
      if(this.done) return;
      const r=b.getBoundingClientRect(); sparkles(r.left+r.width/2, r.top+r.height/2);
      SFX.pop(); this.score++;
      document.getElementById('pop-score').textContent='タッチ: '+this.score+' / '+this.goal;
      anim.cancel(); b.remove();
      if(this.score>=this.goal){
        this.done=true; this.running=false;
        if(this.timer){ clearInterval(this.timer); this.timer=null; }
        Levels.next('pop');
        setTimeout(()=>celebrate(()=>this.start()), 400);
      }
    };
    b.addEventListener('touchstart', pop, {passive:false});
    b.addEventListener('mousedown', pop);
  },
  stop(){ this.running=false; if(this.timer){ clearInterval(this.timer); this.timer=null; }
    document.getElementById('pop-field').innerHTML=''; }
};

/* ════════════════════════════════════════════════════════════════
   Router
   ════════════════════════════════════════════════════════════════ */
const MODES = { shapes:ModeShapes, colors:ModeColors, match:ModeMatch, pop:ModePop };
const Router = {
  go(name){
    // stop current mode
    if(MODES[App.current]) MODES[App.current].stop && MODES[App.current].stop();
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+name).classList.add('active');
    App.current=name;
    if(MODES[name]) MODES[name].start();
    updateSoundIcons();
  }
};

document.querySelectorAll('[data-go]').forEach(b=>{
  b.addEventListener('click', ()=>{ SFX.unlock(); Router.go(b.dataset.go); });
});
document.querySelectorAll('.snd, #sound-menu').forEach(b=> b.addEventListener('click', e=>{ e.stopPropagation(); toggleSound(); }));
updateSoundIcons();

/* ── Service worker for offline ── */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
