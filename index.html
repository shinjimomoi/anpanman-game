<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>アンパンマン かたちあわせ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; font-family: sans-serif; overflow: hidden; user-select: none; position: relative; }

  /* ── Background ── */
  #bg { position: fixed; inset: 0; z-index: 0; }

  /* ── Game layout ── */
  #game {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    touch-action: none;
  }

  #title {
    text-align: center; padding: 16px 0 6px;
    font-size: 28px; font-weight: bold; color: #fff;
    text-shadow: 2px 2px 0 #E05000, -1px -1px 0 #E05000;
    letter-spacing: 2px; flex-shrink: 0;
  }

  /* Frosted panels so the background shows through at the sides */
  #targets-wrap, #pieces-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 6px 10px;
  }
  #targets-panel, #pieces-panel {
    width: 100%;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-radius: 24px;
    border: 1.5px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: space-around;
    padding: 14px 8px;
  }

  #divider {
    text-align: center; font-size: 18px; color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.35);
    padding: 0; flex-shrink: 0;
  }

  /* ── Targets ── */
  .target {
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
    animation: pulse 2.2s ease-in-out infinite;
  }
  .target.filled { animation: pop 0.35s ease forwards; }
  .target svg { width: 100%; height: 100%; }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.22); }
    100% { transform: scale(1); }
  }

  /* ── Pieces ── */
  .piece {
    width: 110px; height: 110px;
    touch-action: none;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.28));
    cursor: grab;
    transition: opacity 0.2s;
  }
  .piece svg { width: 100%; height: 100%; display: block; }
  .piece.placed { opacity: 0 !important; pointer-events: none; }

  /* Ghost: positioned once, moved only via transform */
  .piece-ghost {
    position: fixed; z-index: 1000; pointer-events: none;
    touch-action: none;
    will-change: transform;
    filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.45));
    cursor: grabbing;
  }
  .piece-ghost svg { width: 100%; height: 100%; display: block; }

  /* ── Celebration ── */
  #celebration {
    display: none; position: fixed; inset: 0;
    background: rgba(255,240,60,0.88); z-index: 9999;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  #celebration.show { display: flex; }
  #celebration .big-text {
    font-size: 52px; font-weight: bold; color: #E05000;
    text-shadow: 3px 3px 0 #fff; animation: bounce 0.5s infinite alternate;
  }
  @keyframes bounce { from{transform:scale(1) rotate(-3deg)} to{transform:scale(1.12) rotate(3deg)} }
  #celebration .anpan-big { width: 160px; height: 160px; }
  #play-again {
    background: #E05000; color: #fff; border: none; border-radius: 50px;
    font-size: 24px; font-weight: bold; padding: 14px 44px;
    cursor: pointer; box-shadow: 0 4px 0 #903000;
  }
  #play-again:active { transform: translateY(3px); box-shadow: 0 1px 0 #903000; }

  /* ── Stars / particles ── */
  .sparkle {
    position: fixed; font-size: 36px; pointer-events: none; z-index: 9998;
    animation: sparkfly 1.1s ease-out forwards;
  }
  @keyframes sparkfly {
    from { opacity: 1; transform: scale(0.4) translateY(0); }
    to   { opacity: 0; transform: scale(1.6) translateY(-140px); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-12px); }
    75%     { transform: translateX(12px); }
  }
</style>
</head>

const emptySVGs = {
  circle: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="52" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="9"/>

  </svg>`,
  square: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect x="9" y="9" width="102" height="102" rx="16" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="9"/>

      fill="none" stroke="#9933CC" stroke-width="5" stroke-dasharray="11 7"/>

// ── Audio ────────────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'success') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.13);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.26);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      o.start(); o.stop(ctx.currentTime + 0.55);
    } else if (type === 'win') {
      [523,587,659,698,784,880].forEach((f,i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f;
        g.gain.setValueAtTime(0.28, ctx.currentTime + i*0.11);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.11 + 0.32);
        o.start(ctx.currentTime + i*0.11);
        o.stop(ctx.currentTime + i*0.11 + 0.35);
      });
    } else if (type === 'wrong') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(210, ctx.currentTime);
      o.frequency.setValueAtTime(175, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.22, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
      o.start(); o.stop(ctx.currentTime + 0.32);
    }
  } catch(e) {}
}

// ── Sparkle burst ────────────────────────────────────────────────────────────
function spawnSparkles(x, y) {
  const em = ['⭐','🌟','✨','🎉','💛','🌈','🎊'];
  for (let i = 0; i < 7; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = em[i % em.length];
    s.style.left  = (x + (Math.random()-0.5)*100) + 'px';
    s.style.top   = (y + (Math.random()-0.5)*80)  + 'px';
    s.style.animationDelay = (i * 0.07) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }
}

// ── Fill target on correct match ─────────────────────────────────────────────
function fillTarget(shape, tx, ty) {
  const target = document.getElementById('target-' + shape);
  target.innerHTML = filledSVGs[shape];
  target.classList.remove('filled');
  target.offsetWidth; // reflow
  target.classList.add('filled');
  placed.add(shape);
  spawnSparkles(tx, ty);
  playSound('success');

  if (placed.size === 3) {
    setTimeout(() => {
      playSound('win');
      spawnSparkles(window.innerWidth*0.25, window.innerHeight*0.5);
      spawnSparkles(window.innerWidth*0.75, window.innerHeight*0.5);
      spawnSparkles(window.innerWidth*0.5,  window.innerHeight*0.35);
      document.getElementById('celebration').classList.add('show');
    }, 550);
  }
}

// ── Drag: START ──────────────────────────────────────────────────────────────
function startDrag(e, el) {
  if (placed.has(el.dataset.shape)) return;

  const t = e.touches ? e.touches[0] : e;
  const r = el.getBoundingClientRect();

  // Record initial positions — these are NEVER updated during drag
  ghostOriginX = r.left;
  ghostOriginY = r.top;
  touchStartX  = t.clientX;
  touchStartY  = t.clientY;
  lastDx = 0;
  lastDy = 0;

  // Build ghost (clone, fixed position set ONCE, movement via transform only)
  ghost = document.createElement('div');
  ghost.className = 'piece-ghost';
  ghost.style.width   = r.width  + 'px';
  ghost.style.height  = r.height + 'px';
  ghost.style.left    = r.left   + 'px';
  ghost.style.top     = r.top    + 'px';
  ghost.style.transform = 'translate3d(0,0,0)';
  ghost.innerHTML = el.innerHTML;   // copy SVG content
  document.body.appendChild(ghost);

  el.style.opacity = '0.22';
  dragging = el;
}

// ── Drag: MOVE ───────────────────────────────────────────────────────────────
function moveDrag(e) {
  if (!ghost) return;
  e.preventDefault();
  const t = e.touches ? e.touches[0] : e;
  lastDx = t.clientX - touchStartX;
  lastDy = t.clientY - touchStartY;
  ghost.style.transform = `translate3d(${lastDx}px,${lastDy}px,0)`;
}

// ── Drag: END ────────────────────────────────────────────────────────────────
function endDrag(e) {
  if (!ghost || !dragging) return;

  // Ghost center from stored origin + accumulated delta (no getBoundingClientRect!)
  const gw = parseFloat(ghost.style.width);
  const gh = parseFloat(ghost.style.height);
  const cx = ghostOriginX + gw/2 + lastDx;
  const cy = ghostOriginY + gh/2 + lastDy;

  ghost.remove();
  ghost = null;

  const shape  = dragging.dataset.shape;
  const target = document.getElementById('target-' + shape);
  const tr     = target.getBoundingClientRect();
  const tx     = tr.left + tr.width  / 2;
  const ty     = tr.top  + tr.height / 2;

  if (Math.hypot(cx - tx, cy - ty) < 90) {
    // ✓ Correct match
    dragging.classList.add('placed');
    fillTarget(shape, tx, ty);
  } else {
    // Check wrong targets
    let hitWrong = false;
    for (const s of SHAPES) {
      if (s === shape) continue;
      const ot = document.getElementById('target-' + s);
      const or = ot.getBoundingClientRect();
      const ox = or.left + or.width  / 2;
      const oy = or.top  + or.height / 2;
      if (Math.hypot(cx - ox, cy - oy) < 90) {
        playSound('wrong');
        ot.style.animation = 'none';
        ot.offsetWidth; // reflow
        ot.style.animation = 'shake 0.32s ease';
        hitWrong = true;
        break;
      }
    }
    dragging.style.opacity = '1';
  }
  dragging = null;
}

// ── Attach listeners ─────────────────────────────────────────────────────────
document.querySelectorAll('.piece').forEach(p => {
  p.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e, p); }, { passive: false });
  p.addEventListener('mousedown',  e => startDrag(e, p));
});

document.addEventListener('touchmove', moveDrag, { passive: false });
document.addEventListener('touchend',  endDrag,  { passive: false });
document.addEventListener('mousemove', moveDrag);
document.addEventListener('mouseup',   endDrag);

// ── Play again ───────────────────────────────────────────────────────────────
document.getElementById('play-again').addEventListener('click', () => {
  placed.clear();
  document.getElementById('celebration').classList.remove('show');
  SHAPES.forEach(s => {
    const target = document.getElementById('target-' + s);
    target.innerHTML = emptySVGs[s];
    target.classList.remove('filled');
    target.style.animation = '';

    const piece = document.getElementById('piece-' + s);
    piece.classList.remove('placed');
    piece.style.opacity = '1';
  });
});
</script>
